<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Mochila Wars</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="splashOverlay">
    <div id="splashTapHint">Tocá para continuar</div>
  </div>

  <div id="game"></div>

  <div id="touchControls">
    <div id="joystickBase">
      <div id="joystickNub"></div>
    </div>
    <div id="actionButtons">
      <div id="actionButtonsRow2">
        <button id="btnBlock" class="actionBtn actionBtn--block">🛡️</button>
        <button id="btnFireball" class="actionBtn actionBtn--fireball">🔥</button>
      </div>
      <div id="actionButtonsRow">
        <button id="btnKick" class="actionBtn actionBtn--kick">PATADA</button>
        <button id="btnPunch" class="actionBtn actionBtn--punch">GOLPE</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/phaser@3.87.0/dist/phaser.min.js"></script>
  <script src="js/audio.js"></script>
  <script src="js/touchControls.js"></script>
  <script src="js/data/players.js"></script>
  <script src="js/data/skins.js"></script>
  <script src="js/data/ladder.js"></script>
  <script src="js/characters.js"></script>
  <script src="js/layoutUtils.js"></script>
  <script src="js/splash.js"></script>
  <script src="js/scenes/BootScene.js"></script>
  <script src="js/scenes/PlayerSelectScene.js"></script>
  <script src="js/scenes/SkinSelectScene.js"></script>
  <script src="js/scenes/LadderScene.js"></script>
  <script src="js/scenes/FightScene.js"></script>
  <script src="js/scenes/GameOverScene.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
